apiVersion: v1
kind: Pod
metadata:
  name: example-workload
  namespace: default
  labels:
    app: example-workload
spec:
  containers:
    - name: workload
      image: ghcr.io/spiffe/spiffe-helper:0.7.0
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
  volumes:
    - name: spire-agent-socket
      hostPath:
        path: /run/spire/sockets
        type: Directory
