apiVersion: apps/v1
kind: Deployment
metadata:
  name: spiffe-client-app
  namespace: spiffe-demo
  labels:
    app: spiffe-client-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spiffe-client-app
  template:
    metadata:
      labels:
        app: spiffe-client-app
    spec:
      serviceAccountName: spiffe-client-app
      containers:
      - name: client-app
        image: image-registry.openshift-image-registry.svc:5000/spiffe-demo/spiffe-client-app:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: API_SERVER_URL
          value: "http://spiffe-api-server.spiffe-demo.svc:8080"
        - name: SPIFFE_ENDPOINT_SOCKET
          value: "unix:///run/spire/sockets/spire-agent.sock"
        - name: OIDC_ISSUER
          value: "https://oidc-discovery.apps.rosa.rosa-69t6c.hyq5.p3.openshiftapps.com"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: spiffe-workload-api
          mountPath: /run/spire/sockets
          readOnly: true
      volumes:
      - name: spiffe-workload-api
        csi:
          driver: csi.spiffe.io
          readOnly: true
