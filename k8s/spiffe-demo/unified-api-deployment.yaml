apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-api
  namespace: spiffe-demo
  labels:
    app: unified-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unified-api
  template:
    metadata:
      labels:
        app: unified-api
    spec:
      serviceAccountName: unified-api
      containers:
      - name: unified-api
        image: image-registry.openshift-image-registry.svc:5000/spiffe-demo/unified-api:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: KEYCLOAK_ISSUER
          value: "https://keycloak-keycloak.apps.rosa.rosa-69t6c.hyq5.p3.openshiftapps.com/realms/demo"
        - name: KEYCLOAK_JWKS_URI
          value: "https://keycloak-keycloak.apps.rosa.rosa-69t6c.hyq5.p3.openshiftapps.com/realms/demo/protocol/openid-connect/certs"
        - name: SPIRE_ISSUER
          value: "https://oidc-discovery.apps.rosa.rosa-69t6c.hyq5.p3.openshiftapps.com"
        - name: SPIRE_JWKS_URI
          value: "https://oidc-discovery.apps.rosa.rosa-69t6c.hyq5.p3.openshiftapps.com/keys"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
