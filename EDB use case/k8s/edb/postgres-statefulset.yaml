apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: edb
data:
  # Custom PostgreSQL configuration for SPIFFE certificate authentication
  postgresql.conf: |
    # Connection settings
    listen_addresses = '*'
    port = 5432
    max_connections = 100
    
    # SSL Configuration
    ssl = on
    ssl_cert_file = '/var/lib/postgresql/server-certs/tls.crt'
    ssl_key_file = '/var/lib/postgresql/server-certs/tls.key'
    ssl_ca_file = '/var/lib/postgresql/client-ca/ca.crt'
    ssl_min_protocol_version = 'TLSv1.2'
    
    # Logging
    log_connections = on
    log_disconnections = on
    log_statement = 'all'
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d.log'
  
  # Client authentication configuration
  pg_hba.conf: |
    # TYPE  DATABASE  USER        ADDRESS       METHOD    OPTIONS
    
    # Local connections (admin)
    local   all       postgres                  trust
    
    # SPIFFE certificate authentication - verify cert is signed by SPIRE CA
    # Using trust auth since SPIFFE certs don't have CN field
    # The certificate verification proves workload identity
    hostssl all       app_readonly  0.0.0.0/0   trust     clientcert=verify-ca
    hostssl all       app_readwrite 0.0.0.0/0   trust     clientcert=verify-ca
    hostssl all       app_admin     0.0.0.0/0   trust     clientcert=verify-ca
    
    # Fallback password auth for admin/testing
    hostssl all       postgres      0.0.0.0/0   scram-sha-256
    host    all       postgres      127.0.0.1/32 trust
  
  # Identity mapping for certificate-based auth
  pg_ident.conf: |
    # MAPNAME         SYSTEM-USERNAME         PG-USERNAME
    # Map certificate CN to PostgreSQL users
    spiffe-map        db-client-app           app_readonly
    spiffe-map        db-admin-app            app_admin
    spiffe-map        db-writer-app           app_readwrite
  
  # Initialization SQL
  init.sql: |
    -- Create roles with different permission levels
    CREATE ROLE app_readonly WITH LOGIN;
    CREATE ROLE app_readwrite WITH LOGIN;
    CREATE ROLE app_admin WITH LOGIN CREATEDB CREATEROLE;
    
    -- Create the demo database
    CREATE DATABASE appdb;
    
    \connect appdb
    
    -- Grant connect permissions
    GRANT CONNECT ON DATABASE appdb TO app_readonly;
    GRANT CONNECT ON DATABASE appdb TO app_readwrite;
    GRANT CONNECT ON DATABASE appdb TO app_admin;
    
    -- Create a sample table
    CREATE TABLE IF NOT EXISTS demo_data (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        created_by VARCHAR(100)
    );
    
    -- Grant permissions to roles
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO app_readonly;
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA public TO app_readwrite;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO app_admin;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_readwrite;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_admin;
    
    -- Insert sample data
    INSERT INTO demo_data (name, created_by) VALUES 
      ('Sample Record 1', 'system'),
      ('Sample Record 2', 'system'),
      ('Sample Record 3', 'system');
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-password
  namespace: edb
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres123"
---
# Service with annotation to auto-generate TLS certificate
apiVersion: v1
kind: Service
metadata:
  name: edb-spiffe-postgres
  namespace: edb
  annotations:
    # OpenShift will auto-generate a serving certificate for this service
    service.beta.openshift.io/serving-cert-secret-name: postgres-server-tls
spec:
  selector:
    app: edb-spiffe-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: edb-spiffe-postgres
  namespace: edb
spec:
  serviceName: edb-spiffe-postgres
  replicas: 1
  selector:
    matchLabels:
      app: edb-spiffe-postgres
  template:
    metadata:
      labels:
        app: edb-spiffe-postgres
    spec:
      serviceAccountName: postgres-sa
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        # Copy config files and set permissions
        - name: init-config
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              # Copy config files
              cp /config/postgresql.conf /etc/postgresql/postgresql.conf
              cp /config/pg_hba.conf /etc/postgresql/pg_hba.conf
              cp /config/pg_ident.conf /etc/postgresql/pg_ident.conf
              cp /config/init.sql /docker-entrypoint-initdb.d/init.sql
              
              # Copy server certificates and set permissions
              cp /server-certs-input/tls.crt /server-certs/tls.crt
              cp /server-certs-input/tls.key /server-certs/tls.key
              
              # Copy client CA (SPIRE CA)
              cp /client-ca-input/ca.crt /client-ca/ca.crt
              
              # Set ownership to postgres user (uid 999)
              chown -R 999:999 /etc/postgresql /server-certs /client-ca /docker-entrypoint-initdb.d
              chmod 600 /server-certs/tls.key
              chmod 644 /server-certs/tls.crt
              chmod 644 /client-ca/ca.crt
              chmod 644 /etc/postgresql/*.conf
          volumeMounts:
            - name: config
              mountPath: /config
            - name: pg-config
              mountPath: /etc/postgresql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            - name: server-certs-input
              mountPath: /server-certs-input
            - name: server-certs
              mountPath: /server-certs
            - name: client-ca-input
              mountPath: /client-ca-input
            - name: client-ca
              mountPath: /client-ca
      containers:
        - name: postgres
          image: postgres:16.2
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-password
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - -c
            - config_file=/etc/postgresql/postgresql.conf
            - -c
            - hba_file=/etc/postgresql/pg_hba.conf
            - -c
            - ident_file=/etc/postgresql/pg_ident.conf
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            - name: pg-config
              mountPath: /etc/postgresql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            - name: server-certs
              mountPath: /var/lib/postgresql/server-certs
            - name: client-ca
              mountPath: /var/lib/postgresql/client-ca
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: postgres-config
        - name: pg-config
          emptyDir: {}
        - name: initdb
          emptyDir: {}
        - name: server-certs-input
          secret:
            secretName: postgres-server-tls
            optional: false
        - name: server-certs
          emptyDir: {}
        - name: client-ca-input
          secret:
            secretName: spire-ca-bundle
        - name: client-ca
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3-csi
        resources:
          requests:
            storage: 1Gi
