apiVersion: v1
kind: Secret
metadata:
  name: spire-ca-bundle
  namespace: edb
type: Opaque
data:
  ca.crt: ""  # Will be populated by script from SPIRE bundle
---
# Script to create this secret:
# export KUBECONFIG=...
# SPIRE_CA=$(oc get configmap spire-bundle -n zero-trust-workload-identity-manager -o jsonpath='{.data.bundle\.crt}' | base64 -w0)
# oc create secret generic spire-ca-bundle --from-literal=ca.crt="$(oc get configmap spire-bundle -n zero-trust-workload-identity-manager -o jsonpath='{.data.bundle\.crt}')" -n edb
